name: build

on:
  push:
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  build:
    needs: test
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: dtolnay/rust-toolchain@stable
      - name: Add macOS Rust targets (universal binary)
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - name: Tauri build (macOS universal)
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          # Forks without signing secrets: build unsigned (auto-updater
          # signatures will be skipped, manual installers still work).
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            unset TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          fi
          npm run tauri build -- --target universal-apple-darwin
      - name: Tauri build (Linux/Windows)
        if: matrix.platform != 'macos-latest'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            unset TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          fi
          npm run tauri build
      - name: Inject pre-baked DMG .DS_Store (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          # GitHub Actions macOS runners are headless — bundle_dmg.sh's
          # AppleScript step that writes .DS_Store (window size, background,
          # icon positions) silently fails. We commit a Finder-blessed
          # .DS_Store harvested via bake-dmg-dsstore.sh in the private
          # infra repo; this step injects it into each freshly-built DMG.
          DSSTORE="src-tauri/icons/dmg-DS_Store"
          if [[ ! -f "$DSSTORE" ]]; then
            echo "::warning::No pre-baked $DSSTORE — DMG ships unstyled."
            exit 0
          fi
          while IFS= read -r DMG; do
            echo "==> Injecting .DS_Store into $DMG"
            RW="${DMG%.dmg}.rw.dmg"
            hdiutil convert "$DMG" -format UDRW -o "$RW"
            DEV=$(hdiutil attach "$RW" -nobrowse -readwrite -noverify | tail -1 | awk '{print $1}')
            MOUNT=$(hdiutil info | awk -v d="$DEV" '$1==d {for (i=3;i<=NF;i++) printf "%s ",$i; print ""}' | sed 's/ *$//')
            cp "$DSSTORE" "$MOUNT/.DS_Store"
            sync
            hdiutil detach "$DEV"
            rm "$DMG"
            hdiutil convert "$RW" -format UDZO -imagekey zlib-level=9 -o "$DMG"
            rm "$RW"
          done < <(find src-tauri/target -path '*/bundle/dmg/*.dmg' -type f)
      - name: Build .pkg installer (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          # Tauri's bundler doesn't ship a .pkg target. We wrap the universal
          # .app with pkgbuild so /Applications drops are scriptable (postinstall
          # strips com.apple.quarantine so unsigned dev builds skip the
          # "unidentified developer" first-launch prompt).
          SCRIPTS=$(mktemp -d)
          cat > "$SCRIPTS/postinstall" <<'EOS'
          #!/bin/bash
          /usr/bin/xattr -dr com.apple.quarantine "/Applications/AI SkillSafe.app" 2>/dev/null || true
          exit 0
          EOS
          chmod +x "$SCRIPTS/postinstall"

          while IFS= read -r APP; do
            VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP/Contents/Info.plist")
            OUT_DIR="$(dirname "$APP")"
            OUT="$OUT_DIR/AI SkillSafe_${VERSION}_universal.pkg"
            echo "==> pkgbuild → $OUT"
            pkgbuild \
              --component "$APP" \
              --install-location /Applications \
              --identifier app.skillsafe.ai.installer \
              --version "$VERSION" \
              --scripts "$SCRIPTS" \
              "$OUT"
          done < <(find src-tauri/target -path '*/bundle/macos/*.app' -prune -type d)
      - uses: actions/upload-artifact@v4
        with:
          name: skillsafe-${{ matrix.platform }}
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.pkg
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.app.tar.gz
            src-tauri/target/**/release/bundle/**/*.AppImage.tar.gz
            src-tauri/target/**/release/bundle/**/*.msi.zip
            src-tauri/target/**/release/bundle/**/*.nsis.zip
            src-tauri/target/**/release/bundle/**/*.sig
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Install

            ### macOS (Apple Silicon + Intel, universal)
            - `*_universal.pkg` — recommended (double-click installer; lays down `/Applications/AI SkillSafe.app` and clears the Gatekeeper quarantine flag).
            - `*_universal.dmg` — alternative (drag `AI SkillSafe` to Applications). On first launch macOS may say "unidentified developer" — right-click the app and choose **Open** once to bypass.

            ### Windows
            - `*_x64-setup.exe` — recommended (NSIS installer)
            - `*_x64_en-US.msi` — alternative (MSI for IT-managed installs)

            ### Linux
            - `*_amd64.AppImage` — `chmod +x` and run, no install needed
            - `*_amd64.deb` — `sudo apt install ./*.deb`

            ### Auto-updates
            The app checks `https://app.skillsafe.ai/version.json` on launch and offers in-app updates verified against this release's `.sig` files. The `*.app.tar.gz`, `*.AppImage.tar.gz`, `*.msi.zip`, `*.nsis.zip` bundles plus their `.sig` files are for the updater — you do not need to download them manually.
          files: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.pkg
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.app.tar.gz
            src-tauri/target/**/release/bundle/**/*.AppImage.tar.gz
            src-tauri/target/**/release/bundle/**/*.msi.zip
            src-tauri/target/**/release/bundle/**/*.nsis.zip
            src-tauri/target/**/release/bundle/**/*.sig
          fail_on_unmatched_files: false
