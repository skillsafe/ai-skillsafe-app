name: build

on:
  push:
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  build:
    needs: test
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, ubuntu-24.04-arm, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: dtolnay/rust-toolchain@stable
      - name: Add macOS Rust targets (universal binary)
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - name: Add Windows ARM64 Rust target (cross-compile from x64 runner)
        if: matrix.platform == 'windows-latest'
        run: rustup target add aarch64-pc-windows-msvc
      - name: Install Linux deps
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          # xdg-utils ships xdg-mime, which Tauri's AppImage bundler shells
          # out to. ubuntu-latest's runner image pre-installs it; the arm64
          # image is more minimal and doesn't, so we install it explicitly.
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils
      - run: npm ci
      - name: Tauri build (macOS universal)
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          # Forks without signing secrets: build unsigned (auto-updater
          # signatures will be skipped, manual installers still work).
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            unset TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          fi
          npm run tauri build -- --target universal-apple-darwin
      - name: Tauri build (Linux/Windows native)
        if: matrix.platform != 'macos-latest'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            unset TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          fi
          npm run tauri build
      - name: Tauri build (Windows ARM64 cross-compile)
        # Cross-compile from the windows-latest x64 runner. GitHub Actions
        # ships windows-11-arm runners now too, but cross-compile keeps the
        # release on a single Windows runner — half the queue time, no
        # separate matrix entry to maintain. Tauri + WiX + NSIS all support
        # ARM64 cross-compile cleanly; webview2 has native ARM64.
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            unset TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          fi
          npm run tauri build -- --target aarch64-pc-windows-msvc
      - name: Bundle appimageupdatetool + zsync metadata (Linux)
        if: startsWith(matrix.platform, 'ubuntu')
        shell: bash
        env:
          # Re-sign the modified AppImage (its bytes change here, so the
          # .sig Tauri just emitted is stale). Keeps the v0.2.10 → v0.2.11
          # bridge alive: old Linux AppImage installs still run Tauri's
          # plugin-updater and need a verifying .sig to install v0.2.11,
          # at which point they switch to the bundled appimageupdatetool.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            unset TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          fi
          # Post-process the AppImage Tauri just built: embed update-info,
          # bundle appimageupdatetool inside, generate the .zsync sidecar,
          # and re-sign for the transitional Tauri-updater bridge.
          # See .github/scripts/bundle-appimage-update.sh for the why.
          bash .github/scripts/bundle-appimage-update.sh
      - name: Inject pre-baked DMG .DS_Store (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          # GitHub Actions macOS runners are headless — bundle_dmg.sh's
          # AppleScript step that writes .DS_Store (window size, background,
          # icon positions) silently fails. We commit a Finder-blessed
          # .DS_Store harvested via bake-dmg-dsstore.sh in the private
          # infra repo; this step injects it into each freshly-built DMG.
          DSSTORE="src-tauri/icons/dmg-DS_Store"
          if [[ ! -f "$DSSTORE" ]]; then
            echo "::warning::No pre-baked $DSSTORE — DMG ships unstyled."
            exit 0
          fi
          while IFS= read -r DMG; do
            echo "==> Injecting .DS_Store into $DMG"
            RW="${DMG%.dmg}.rw.dmg"
            hdiutil convert "$DMG" -format UDRW -o "$RW"
            DEV=$(hdiutil attach "$RW" -nobrowse -readwrite -noverify | tail -1 | awk '{print $1}')
            MOUNT=$(hdiutil info | awk -v d="$DEV" '$1==d {for (i=3;i<=NF;i++) printf "%s ",$i; print ""}' | sed 's/ *$//')
            cp "$DSSTORE" "$MOUNT/.DS_Store"
            sync
            hdiutil detach "$DEV"
            rm "$DMG"
            hdiutil convert "$RW" -format UDZO -imagekey zlib-level=9 -o "$DMG"
            rm "$RW"
          done < <(find src-tauri/target -path '*/bundle/dmg/*.dmg' -type f)
      - name: DEBUG — inspect dist
        shell: bash
        run: |
          echo "--- dist tree ---"
          ls -la dist dist/assets 2>&1 || true
          echo "--- src/i18n/locales tree ---"
          ls -la src/i18n/locales 2>&1 || true
          wc -l src/i18n/locales/*.json 2>&1 || true
          echo "--- bundle size ---"
          wc -c dist/assets/index-*.js 2>&1 || true
          echo "--- translated strings in bundle ---"
          grep -c '"Local Backup"' dist/assets/index-*.js || true
          grep -c '"Sauvegarde locale"' dist/assets/index-*.js || true
          grep -c '"backupPanel\.title"' dist/assets/index-*.js || true
          echo "--- first 200 chars of bundle ---"
          head -c 200 dist/assets/index-*.js || true
          echo
      - name: DEBUG — upload dist
        uses: actions/upload-artifact@v4
        with:
          name: debug-dist-${{ matrix.platform }}
          path: dist/**
      - uses: actions/upload-artifact@v4
        with:
          name: skillsafe-${{ matrix.platform }}
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.AppImage.tar.gz
            src-tauri/target/**/release/bundle/**/*.AppImage.zsync
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.app.tar.gz
            src-tauri/target/**/release/bundle/**/*.nsis.zip
            src-tauri/target/**/release/bundle/**/*.sig
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Install

            ### macOS (Apple Silicon + Intel, universal)
            Download `*_universal.dmg`, open, drag **AI SkillSafe** to Applications.
            On first launch macOS may say "unidentified developer" — right-click the app and choose **Open** once to bypass.

            ### Windows (x64 — Intel/AMD)
            - `*_x64-setup.exe` — NSIS installer

            ### Windows (ARM64 — Surface Pro X / Snapdragon X / Copilot+ PCs)
            - `*_arm64-setup.exe` — NSIS installer

            ### Linux (x64 — Intel/AMD)
            - `*_amd64.AppImage` — portable, auto-updates via bundled AppImageUpdate (zsync delta). `chmod +x *.AppImage && ./*.AppImage`
            - `*_amd64.deb` — `sudo apt install ./*.deb` (manual-update only)

            ### Linux (ARM64 — Raspberry Pi 4/5, Ampere, Apple Silicon VMs)
            - `*_aarch64.AppImage` — portable, auto-updates via bundled AppImageUpdate. `chmod +x *.AppImage && ./*.AppImage`
            - `*_arm64.deb` — `sudo apt install ./*.deb` (manual-update only)

            ### Auto-updates
            macOS / Windows: the app fetches `latest.json` from this release on launch and verifies the downloaded bundle against the matching `.sig` file (so `*.app.tar.gz`, `*-setup.exe`, and their `.sig` files are for the updater — you don't download them manually).

            Linux AppImage: the app ships AppImageUpdate inside. On update it reads the embedded zsync URL pattern, downloads only the changed chunks from the `*.AppImage.zsync` sidecar in this release, atomically rewrites your local AppImage, and relaunches from the on-disk path so the new SquashFS payload is mounted cleanly.

            Linux `.deb`: manual-update only. Tauri's bundler doesn't auto-sign `.deb` and dpkg/apt need root, so the app opens the download page on update. Switch to the AppImage if you want hands-off updates.
          files: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.AppImage.tar.gz
            src-tauri/target/**/release/bundle/**/*.AppImage.zsync
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.app.tar.gz
            src-tauri/target/**/release/bundle/**/*.nsis.zip
            src-tauri/target/**/release/bundle/**/*.sig
          fail_on_unmatched_files: false

  manifest:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          SCRIPT="$(pwd)/.github/scripts/make-latest-json.py"
          WORK="$(mktemp -d)"
          cp "$SCRIPT" "$WORK/make-latest-json.py"
          cd "$WORK"
          gh release download "$TAG" -R "$REPO" -p '*.sig'
          python3 make-latest-json.py > latest.json
          echo "--- latest.json ---"
          cat latest.json
          gh release upload "$TAG" latest.json -R "$REPO" --clobber
