name: build

on:
  push:
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  build:
    needs: test
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, ubuntu-24.04-arm, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: dtolnay/rust-toolchain@stable
      - name: Add macOS Rust targets (universal binary)
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - name: Add Windows ARM64 Rust target (cross-compile from x64 runner)
        if: matrix.platform == 'windows-latest'
        run: rustup target add aarch64-pc-windows-msvc
      - name: Install Linux deps
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - name: Fetch Azure Trusted Signing dlib (Windows, when configured)
        # Only the Microsoft-signed dlib can talk to Azure Trusted Signing
        # via signtool. Pulled fresh per CI run from the public NuGet feed so
        # we don't have to vendor it. When AZURE_TRUSTED_SIGNING_ACCOUNT_NAME
        # is unset (forks, dev tags), we skip and the wrapper script no-ops.
        if: matrix.platform == 'windows-latest' && env.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME != ''
        env:
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
        shell: pwsh
        run: |
          $pkgDir = Join-Path $env:RUNNER_TEMP "trusted-signing"
          New-Item -ItemType Directory -Force -Path $pkgDir | Out-Null
          nuget install Microsoft.Trusted.Signing.Client `
            -Version 1.0.53 `
            -OutputDirectory $pkgDir `
            -ExcludeVersion `
            -NonInteractive
          $dlib = Join-Path $pkgDir "Microsoft.Trusted.Signing.Client/bin/x64/Azure.CodeSigning.Dlib.dll"
          if (-not (Test-Path $dlib)) {
            Write-Error "dlib not found at $dlib after nuget install"
            exit 1
          }
          Write-Host "AZURE_TRUSTED_SIGNING_DLIB_PATH=$dlib"
          "AZURE_TRUSTED_SIGNING_DLIB_PATH=$dlib" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - name: Tauri build (macOS universal)
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          # Forks without signing secrets: build unsigned (auto-updater
          # signatures will be skipped, manual installers still work).
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            unset TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          fi
          npm run tauri build -- --target universal-apple-darwin
      - name: Tauri build (Linux/Windows native)
        if: matrix.platform != 'macos-latest'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Azure Trusted Signing (Windows Authenticode). All six are
          # passed unconditionally — sign-windows.ps1 no-ops cleanly when
          # any are empty, so forks without secrets still build unsigned.
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          AZURE_TRUSTED_SIGNING_CERT_PROFILE_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE_NAME }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            unset TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          fi
          npm run tauri build
      - name: Tauri build (Windows ARM64 cross-compile)
        # Cross-compile from the windows-latest x64 runner. GitHub Actions
        # ships windows-11-arm runners now too, but cross-compile keeps the
        # release on a single Windows runner — half the queue time, no
        # separate matrix entry to maintain. Tauri + WiX + NSIS all support
        # ARM64 cross-compile cleanly; webview2 has native ARM64.
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          AZURE_TRUSTED_SIGNING_CERT_PROFILE_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE_NAME }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            unset TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          fi
          npm run tauri build -- --target aarch64-pc-windows-msvc
      - name: Inject pre-baked DMG .DS_Store (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          # GitHub Actions macOS runners are headless — bundle_dmg.sh's
          # AppleScript step that writes .DS_Store (window size, background,
          # icon positions) silently fails. We commit a Finder-blessed
          # .DS_Store harvested via bake-dmg-dsstore.sh in the private
          # infra repo; this step injects it into each freshly-built DMG.
          DSSTORE="src-tauri/icons/dmg-DS_Store"
          if [[ ! -f "$DSSTORE" ]]; then
            echo "::warning::No pre-baked $DSSTORE — DMG ships unstyled."
            exit 0
          fi
          while IFS= read -r DMG; do
            echo "==> Injecting .DS_Store into $DMG"
            RW="${DMG%.dmg}.rw.dmg"
            hdiutil convert "$DMG" -format UDRW -o "$RW"
            DEV=$(hdiutil attach "$RW" -nobrowse -readwrite -noverify | tail -1 | awk '{print $1}')
            MOUNT=$(hdiutil info | awk -v d="$DEV" '$1==d {for (i=3;i<=NF;i++) printf "%s ",$i; print ""}' | sed 's/ *$//')
            cp "$DSSTORE" "$MOUNT/.DS_Store"
            sync
            hdiutil detach "$DEV"
            rm "$DMG"
            hdiutil convert "$RW" -format UDZO -imagekey zlib-level=9 -o "$DMG"
            rm "$RW"
          done < <(find src-tauri/target -path '*/bundle/dmg/*.dmg' -type f)
      - uses: actions/upload-artifact@v4
        with:
          name: skillsafe-${{ matrix.platform }}
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.app.tar.gz
            src-tauri/target/**/release/bundle/**/*.AppImage.tar.gz
            src-tauri/target/**/release/bundle/**/*.msi.zip
            src-tauri/target/**/release/bundle/**/*.nsis.zip
            src-tauri/target/**/release/bundle/**/*.sig
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Install

            ### macOS (Apple Silicon + Intel, universal)
            Download `*_universal.dmg`, open, drag **AI SkillSafe** to Applications.
            On first launch macOS may say "unidentified developer" — right-click the app and choose **Open** once to bypass.

            ### Windows (x64 — Intel/AMD)
            - `*_x64-setup.exe` — recommended (NSIS installer)
            - `*_x64_en-US.msi` — alternative (MSI for IT-managed installs)

            ### Windows (ARM64 — Surface Pro X / Snapdragon X / Copilot+ PCs)
            - `*_arm64-setup.exe` — recommended (NSIS installer)
            - `*_arm64_en-US.msi` — alternative (MSI for IT-managed installs)

            ### Linux (x64 — Intel/AMD)
            - `*_amd64.AppImage` — `chmod +x` and run, no install needed
            - `*_amd64.deb` — `sudo apt install ./*.deb`

            ### Linux (ARM64 — Raspberry Pi 4/5, Ampere, Apple Silicon VMs)
            - `*_aarch64.AppImage` — `chmod +x` and run, no install needed
            - `*_arm64.deb` — `sudo apt install ./*.deb`

            ### Auto-updates
            The app fetches `latest.json` from this release on launch and verifies the downloaded bundle against the matching `.sig` file. The `*.app.tar.gz`, `*.AppImage.tar.gz`, `*.msi.zip`, `*.nsis.zip` bundles plus their `.sig` files are for the updater — you do not need to download them manually.
          files: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.app.tar.gz
            src-tauri/target/**/release/bundle/**/*.AppImage.tar.gz
            src-tauri/target/**/release/bundle/**/*.msi.zip
            src-tauri/target/**/release/bundle/**/*.nsis.zip
            src-tauri/target/**/release/bundle/**/*.sig
          fail_on_unmatched_files: false

  manifest:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          SCRIPT="$(pwd)/.github/scripts/make-latest-json.py"
          WORK="$(mktemp -d)"
          cp "$SCRIPT" "$WORK/make-latest-json.py"
          cd "$WORK"
          gh release download "$TAG" -R "$REPO" -p '*.sig'
          python3 make-latest-json.py > latest.json
          echo "--- latest.json ---"
          cat latest.json
          gh release upload "$TAG" latest.json -R "$REPO" --clobber
